appId: com.bobpark.shorts-ai
productName: Shorts AI
copyright: Copyright (c) 2026 Bob Park
directories:
  output: out
files:
  - out/main/**
  - out/preload/**
  - out/renderer/**
  - package.json
  - '!**/*.test.*'
  - '!**/__tests__/**'
asar: true
asarUnpack:
  # better-sqlite3 has a native .node binding that can't run from inside asar
  - '**/node_modules/better-sqlite3/**'

mac:
  category: public.app-category.video
  target:
    - target: dmg
      arch: [arm64]
  identity: null
  hardenedRuntime: false
  minimumSystemVersion: '12.0'
  # Platform-specific binaries (no .exe suffix on macOS).
  extraResources:
    - from: build-resources/mac-${arch}/uv
      to: uv
    - from: build-resources/mac-${arch}/ffmpeg
      to: ffmpeg
    - from: build-resources/mac-${arch}/yt-dlp
      to: yt-dlp

win:
  target:
    - target: nsis
      arch: [x64]
  # We don't sign — explicitly disable so electron-builder doesn't try to
  # invoke signtool via wine (which would fail on macOS hosts).
  signAndEditExecutable: false
  # Platform-specific binaries (.exe suffix on Windows).
  extraResources:
    - from: build-resources/win-${arch}/uv.exe
      to: uv.exe
    - from: build-resources/win-${arch}/ffmpeg.exe
      to: ffmpeg.exe
    - from: build-resources/win-${arch}/yt-dlp.exe
      to: yt-dlp.exe

nsis:
  oneClick: false                        # show install wizard, let user pick install dir
  perMachine: false                      # install into %LOCALAPPDATA% (no admin prompt)
  # perMachine: false + allowElevation: true (the default) is electron-builder's
  # "mixed mode" — the wizard asks the user "current user / all users". When the
  # user picks "all users", install lands in Program Files and uninstall needs
  # admin elevation, which is handed off via the bundled elevate.exe helper.
  # That handoff is fragile (often fails silently with no UI), so users report
  # "uninstall doesn't work". Forcing allowElevation: false removes the choice
  # entirely and pins every install to %LOCALAPPDATA% — uninstall then runs as
  # a regular user with no elevation, which works reliably.
  allowElevation: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Shorts AI
  # NSIS only tracks files it installed, so the sidecar-venv the wizard creates
  # at runtime under %APPDATA% would otherwise leak across uninstalls. This
  # flag tells the uninstaller to wipe %APPDATA%\<appId>\ too.
  deleteAppDataOnUninstall: true

# ${os} → 'mac' | 'win' | 'linux'; ${arch} → 'arm64' | 'x64'.
# python-runtime, requirements.txt, and sidecar-src are shared across platforms
# (no extension difference). The per-platform binary entries are in mac:/win: above.
extraResources:
  - from: build-resources/${os}-${arch}/python-runtime
    to: python-runtime
  - from: sidecar/requirements.txt
    to: requirements.txt
  - from: sidecar/src
    to: sidecar-src

dmg:
  title: Shorts AI ${version}
  iconSize: 128
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications
